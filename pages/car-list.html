<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car List</title>

<link rel="stylesheet" href="../css/reset.css">
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/header.css">

<script src="../js/hamburger-handler.js" defer></script>

<style>
html {
    background-color: var(--foreground);
}

main {
    background-color: var(--background);
    padding: 40px;
    display: flex;
    flex-direction: column;
    gap: 30px;
}

/* TOP */
.top-section {
    display: flex;
    gap: 30px;
}

/* FILTERS */
.filters {
    background-color: var(--foreground);
    padding: 20px;
    border-radius: 15px;
    width: 250px;
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.filters h3 {
    color: var(--primary-color);
}

.filters input,
.filters select,
.filters button {
    padding: 8px;
    border-radius: 8px;
    border: 1px solid var(--text-color);
    background-color: var(--background);
    color: var(--text-color);
}

.filters button:hover {
    border-color: var(--primary-color);
    color: var(--primary-color);
    cursor: pointer;
}

/* HERO */
.hero {
    flex: 1;
    position: relative;
}

.hero img {
    width: 100%;
    height: 60vh;
    object-fit: cover;
    border-radius: 15px;
}

.hero h2 {
    position: absolute;
    top: 20px;
    left: 20px;
    color: var(--primary-color);
}

.hero p {
    position: absolute;
    bottom: 20px;
    left: 20px;
    color: var(--primary-color);
}

/* CAR GRID */
.car-container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 20px;
}

/* CARD */
.car-card {
    background-color: var(--foreground);
    border-radius: 15px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
}

.car-card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
}

.car-info {
    padding: 10px;
}

.car-info h3 {
    color: var(--primary-color);
}

.car-info p {
    margin: 3px 0;
}

/* BUTTON */
.view-btn {
    margin-top: auto;
    padding: 10px;
    border: none;
    background-color: var(--primary-color);
    color: var(--background);
    cursor: pointer;
}

.view-btn:hover {
    opacity: 0.85;
}

/* MOBILE */
@media (max-width: 800px) {
    .top-section {
        flex-direction: column;
    }

    .filters {
        width: 100%;
    }
}
</style>
</head>

<body>

<!-- HEADER -->
<header>
    <div id="hburger-container">
        <button id="hamburger-icon">=</button>
        <a id="Car Listing" href="../index.html">LOGO</a>
        <div id="invis-spacer"></div>
    </div>

    <nav>
        <ul id="header-container">
            <li class="header-item current-page"><a href="./car-list.html">Car Leasing</a></li>
            <li class="header-item"><a href="./car-list.html">Van Leasing</a></li>
            <li class="header-item"><a href="./about-us.html">Contact Us</a></li>
            <li class="header-item"><a href="./about-us.html">About Us</a></li>
        </ul>
    </nav>
</header>

<main>

<!-- TOP -->
<div class="top-section">

    <!-- FILTERS -->
    <div class="filters">
        <h3>Filters</h3>

        <label>Max Price</label>
        <input type="range" min="100" max="2000">

        <label>Make</label>
        <select>
            <option>Any</option>
            <option>Toyota</option>
            <option>Honda</option>
        </select>

        <label>Type</label>
        <select>
            <option>Any</option>
            <option>Sedan</option>
            <option>SUV</option>
        </select>

        <button>Search</button>
    </div>

    <!-- HERO -->
    <div class="hero">
        <img src="../img/red-nissan.png" alt="Nissan Versa">
        <h2>Nissan Versa</h2>
        <p>$999/mo</p>
    </div>

</div>

<!-- CAR LIST -->
<div class="car-container">

    <div class="car-card">
        <img src="../img/Nissan_versa.png">
        <div class="car-info">
            <h3>Nissan Versa</h3>
            <p>MPG City: 27</p>
            <p>MPG HW: 35</p>
            <p>$999/mo</p>
        </div>
        <button class="view-btn" onclick="goToDetails()">View Details</button>
    </div>

    <div class="car-card">
        <img src="../img/Toyota_001.jpg">
        <div class="car-info">
            <h3>Toyota Corolla</h3>
            <p>MPG City: 30</p>
            <p>MPG HW: 38</p>
            <p>$899/mo</p>
        </div>
        <button class="view-btn" onclick="goToDetails()">View Details</button>
    </div>

    <div class="car-card">
        <img src="../img/Honda_001.jpg">
        <div class="car-info">
            <h3>Honda Civic</h3>
            <p>MPG City: 31</p>
            <p>MPG HW: 40</p>
            <p>$950/mo</p>
        </div>
        <button class="view-btn" onclick="goToDetails()">View Details</button>
    </div>

</div>

</main>

<script>
function goToDetails() {
    window.location.href = "./car-details.html";
}
</script>

</body>
</html>
