<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car List</title>

<link rel="stylesheet" href="../css/reset.css">
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/header.css">

<script src="../js/hamburger-handler.js" defer></script>

<style>
html { background-color: var(--foreground); }

main {
    background-color: var(--background);
    padding: 40px;
    display: flex;
    flex-direction: column;
    gap: 30px;
}

.top-section {
    display: flex;
    gap: 30px;
}

.filters {
    background-color: var(--foreground);
    padding: 20px;
    border-radius: 15px;
    width: 250px;
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.hero {
    flex: 1;
    position: relative;
}

.hero img {
    width: 100%;
    height: 60vh;
    object-fit: cover;
    border-radius: 15px;
}

.hero h2, .hero p {
    position: absolute;
    left: 20px;
    color: var(--primary-color);
}

.hero h2 { top: 20px; }
.hero p { bottom: 20px; }

.car-container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 20px;
}

.car-card {
    background-color: var(--foreground);
    border-radius: 15px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
}

.car-card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
}

.car-info {
    padding: 10px;
}

.view-btn {
    margin-top: auto;
    padding: 10px;
    border: none;
    background-color: var(--primary-color);
    color: var(--background);
    cursor: pointer;
}
</style>
</head>

<body>

<header>
    <div id="hburger-container">
        <button id="hamburger-icon">=</button>
        <a id="Car List" href="../index.html">Lings Cars</a>
        <div id="invis-spacer"></div>
    </div>

    <nav>
        <ul id="header-container">
            <li class="header-item current-page"><a href="./car-list.html">Car Leasing</a></li>
            <li class="header-item"><a href="./car-list.html">Van Leasing</a></li>
            <li class="header-item"><a href="./about-us.html">Contact Us</a></li>
            <li class="header-item"><a href="./about-us.html">About Us</a></li>
        </ul>
    </nav>
</header>

<main>

<div class="top-section">

    <div class="filters">
        <h3>Filters</h3>
        <input type="range">
        <select><option>Make</option></select>
        <select><option>Type</option></select>
        <button>Search</button>
    </div>

    <div class="hero">
        <img src="../img/red-nissan.png">
        <h2>Nissan Versa</h2>
        <p>$999/mo</p>
    </div>

</div>

<div class="car-container">

    <div class="car-card">
        <img src="../img/Nissan_versa.png">
        <div class="car-info">
            <h3>Nissan Versa</h3>
            <p>$999/mo</p>
        </div>
        <button class="view-btn" data-car="Nissan Versa">View Details</button>
    </div>

    <div class="car-card">
        <img src="../img/toyota.png">
        <div class="car-info">
            <h3>Toyota Corolla</h3>
            <p>$899/mo</p>
        </div>
        <button class="view-btn" data-car="Toyota Corolla">View Details</button>
    </div>

    <div class="car-card">
        <img src="../img/honda.png">
        <div class="car-info">
            <h3>Honda Civic</h3>
            <p>$950/mo</p>
        </div>
        <button class="view-btn" data-car="Honda Civic">View Details</button>
    </div>

</div>

</main>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const buttons = document.querySelectorAll('.view-btn');

    buttons.forEach(button => {
        button.addEventListener('click', () => {
            const carName = button.getAttribute('data-car');
            window.location.href = `./car-details.html?car=${encodeURIComponent(carName)}`;
        });
    });
});
</script>

</body>
</html>
